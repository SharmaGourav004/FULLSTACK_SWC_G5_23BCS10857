<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q13 - User Cards</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3efe7;
      --bg2: #e3f0ef;
      --card: rgba(255, 255, 255, 0.9);
      --text: #13222f;
      --muted: #5f6c76;
      --line: rgba(19, 34, 47, 0.12);
      --accent: #0f766e;
      --accent2: #c2410c;
      --shadow: 0 20px 50px rgba(15, 118, 110, 0.12);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 30%),
        radial-gradient(circle at 90% 20%, rgba(194, 65, 12, 0.12), transparent 24%),
        linear-gradient(135deg, var(--bg), var(--bg2));
    }

    .wrap {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .panel {
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 14px;
      align-items: end;
      margin-bottom: 22px;
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(15, 118, 110, 0.1);
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 12px;
    }

    h1 { margin: 0; font-size: clamp(2rem, 4vw, 3.2rem); line-height: 1; }
    .sub { margin: 12px 0 0; color: var(--muted); max-width: 70ch; line-height: 1.6; }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #14b8a6);
      color: white;
      cursor: pointer;
      box-shadow: 0 12px 26px rgba(15, 118, 110, 0.18);
    }

    .btn:disabled { opacity: 0.7; cursor: progress; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.94rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .user-card {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 10px 24px rgba(19, 34, 47, 0.07);
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 100%;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, var(--accent), #22c55e);
    }

    .name { margin: 0; font-size: 1.1rem; }
    .text { margin: 0; color: var(--muted); line-height: 1.55; word-break: break-word; }

    .loading {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .skeleton {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(255,255,255,0.72) 20%, rgba(255,255,255,0.98) 40%, rgba(255,255,255,0.72) 60%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite linear;
      min-height: 188px;
    }

    .bar { height: 14px; border-radius: 999px; background: rgba(19, 34, 47, 0.08); margin-top: 12px; }
    .bar.sm { width: 65%; }
    .bar.md { width: 80%; }
    .bar.lg { width: 92%; }
    .avatar-skel { width: 54px; height: 54px; border-radius: 18px; background: rgba(19, 34, 47, 0.08); }

    .state {
      padding: 18px;
      border-radius: 18px;
      background: rgba(15, 118, 110, 0.08);
      color: var(--accent);
      font-weight: 700;
      border: 1px solid rgba(15, 118, 110, 0.12);
    }

    .error {
      background: rgba(220, 38, 38, 0.08);
      color: #b91c1c;
      border-color: rgba(220, 38, 38, 0.14);
    }

    @keyframes shimmer { to { background-position: 200% 0; } }

    @media (max-width: 1100px) { .grid, .loading { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 640px) {
      .wrap { width: min(100% - 16px, 1180px); padding-top: 16px; }
      .panel { padding: 18px; border-radius: 22px; }
      .grid, .loading { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="topbar">
        <div>
          <div class="eyebrow">Q13 - Mock API users</div>
          <h1>Fetched user cards with loading state</h1>
          <p class="sub">This page requests mock data, shows a loading skeleton while the request is in flight, and then renders user cards with name, email, company, and location.</p>
        </div>
        <button class="btn" id="reloadBtn">Reload users</button>
      </div>

      <div class="meta">
        <div class="chip" id="statusChip">Status: idle</div>
        <div class="chip" id="countChip">0 users loaded</div>
      </div>

      <div id="message"></div>
      <div id="content"></div>
    </section>
  </main>

  <script>
    const content = document.getElementById('content');
    const message = document.getElementById('message');
    const statusChip = document.getElementById('statusChip');
    const countChip = document.getElementById('countChip');
    const reloadBtn = document.getElementById('reloadBtn');

    const userPool = [
      ['Aarav', 'Patel', 'Northwind Labs', 'Bengaluru'],
      ['Mira', 'Shah', 'Skyline Studio', 'Mumbai'],
      ['Kabir', 'Singh', 'Pixel Forge', 'Delhi'],
      ['Nina', 'Iyer', 'Atlas Health', 'Chennai'],
      ['Rohan', 'Mehta', 'Sunrise Retail', 'Pune'],
      ['Sara', 'Khan', 'Bluepeak Systems', 'Hyderabad'],
      ['Ishaan', 'Kapoor', 'Nova Foods', 'Kolkata'],
      ['Diya', 'Nair', 'Orbit Media', 'Kochi']
    ];

    const palette = ['#0f766e', '#2563eb', '#c2410c', '#7c3aed', '#15803d', '#be123c', '#0ea5e9', '#92400e'];

    function createMockUsers() {
      return userPool.map(([firstName, lastName, company, city], index) => ({
        id: index + 1,
        name: `${firstName} ${lastName}`,
        email: `${firstName.toLowerCase()}.${lastName.toLowerCase()}@mail.example`,
        phone: `+91 9000${String(index + 11).padStart(2, '0')} 345`,
        company,
        city,
        color: palette[index % palette.length]
      }));
    }

    function mockFetchUsers() {
      return new Promise((resolve) => {
        setTimeout(() => resolve(createMockUsers()), 1200);
      });
    }

    function renderLoading() {
      message.innerHTML = '<div class="state">Loading users from the mock API...</div>';
      statusChip.textContent = 'Status: loading';
      content.innerHTML = `
        <div class="loading">
          ${Array.from({ length: 8 }, () => `
            <article class="skeleton">
              <div class="avatar-skel"></div>
              <div class="bar lg"></div>
              <div class="bar md"></div>
              <div class="bar sm"></div>
              <div class="bar lg"></div>
            </article>
          `).join('')}
        </div>
      `;
    }

    function renderUsers(users) {
      message.innerHTML = '';
      statusChip.textContent = 'Status: ready';
      countChip.textContent = `${users.length} users loaded`;
      content.innerHTML = `
        <section class="grid">
          ${users.map(user => `
            <article class="user-card">
              <div class="avatar" style="background: linear-gradient(135deg, ${user.color}, #22c55e)">${user.name.split(' ').map(part => part[0]).join('')}</div>
              <div>
                <h2 class="name">${user.name}</h2>
                <p class="text">${user.company}</p>
              </div>
              <p class="text"><strong>Email:</strong> ${user.email}</p>
              <p class="text"><strong>Phone:</strong> ${user.phone}</p>
              <p class="text"><strong>Location:</strong> ${user.city}</p>
            </article>
          `).join('')}
        </section>
      `;
    }

    async function loadUsers() {
      renderLoading();
      reloadBtn.disabled = true;
      try {
        const users = await mockFetchUsers();
        renderUsers(users);
      } catch (error) {
        message.innerHTML = `<div class="state error">Unable to load users: ${error.message}</div>`;
        statusChip.textContent = 'Status: error';
        content.innerHTML = '';
      } finally {
        reloadBtn.disabled = false;
      }
    }

    reloadBtn.addEventListener('click', loadUsers);
    loadUsers();
  </script>
</body>
</html>
