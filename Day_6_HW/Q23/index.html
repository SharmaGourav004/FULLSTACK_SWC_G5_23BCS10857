```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Carousel</title>

<style>

  body{
    font-family:Arial;
    background:#f4f4f4;
    padding:40px;
    text-align:center;
  }

  .carousel{
    width:600px;
    margin:auto;
    position:relative;
  }

  img{
    width:100%;
    height:350px;
    object-fit:cover;
    border-radius:10px;
  }

  button{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    padding:10px;
    cursor:pointer;
    background:white;
    border:none;
    font-size:20px;
  }

  .prev{
    left:10px;
  }

  .next{
    right:10px;
  }

</style>
</head>

<body>

<h2>Image Carousel</h2>

<div class="carousel" id="carousel">

  <img id="slide" src="https://picsum.photos/id/1015/600/350">

  <button class="prev" onclick="prevSlide()">
    ❮
  </button>

  <button class="next" onclick="nextSlide()">
    ❯
  </button>

</div>

<script>

  const images = [
    "https://picsum.photos/id/1015/600/350",
    "https://picsum.photos/id/1016/600/350",
    "https://picsum.photos/id/1018/600/350"
  ];

  let index = 0;

  const slide =
    document.getElementById("slide");

  const carousel =
    document.getElementById("carousel");

  function showSlide(){
    slide.src = images[index];
  }

  function nextSlide(){
    index = (index + 1) % images.length;
    showSlide();
  }

  function prevSlide(){
    index =
      (index - 1 + images.length) %
      images.length;

    showSlide();
  }

  let autoSlide = setInterval(nextSlide,3000);

  carousel.addEventListener("mouseenter",()=>{
    clearInterval(autoSlide);
  });

  carousel.addEventListener("mouseleave",()=>{
    autoSlide = setInterval(nextSlide,3000);
  });

</script>

</body>
</html>
```
