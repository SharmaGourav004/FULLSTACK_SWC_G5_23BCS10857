<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q14 - Retry API</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #0f172a;
      --bg2: #111827;
      --card: rgba(15, 23, 42, 0.68);
      --panel: rgba(255, 255, 255, 0.94);
      --text: #0f172a;
      --muted: #586579;
      --line: rgba(15, 23, 42, 0.12);
      --accent: #3b82f6;
      --accent2: #f97316;
      --danger: #dc2626;
      --success: #16a34a;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.28);
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.18), transparent 24%),
        radial-gradient(circle at 90% 20%, rgba(249, 115, 22, 0.18), transparent 22%),
        linear-gradient(160deg, var(--bg), var(--bg2));
    }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero {
      border-radius: 30px;
      padding: 24px;
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.2);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .eyebrow {
      display: inline-flex;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.1);
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0.03em;
      margin-bottom: 14px;
    }

    h1 { margin: 0; color: #fff; font-size: clamp(2rem, 4vw, 3.3rem); line-height: 1; }
    .lead { margin: 12px 0 0; max-width: 70ch; color: rgba(226, 232, 240, 0.8); line-height: 1.65; }

    .surface {
      margin-top: 18px;
      background: var(--panel);
      border-radius: 26px;
      padding: 22px;
      border: 1px solid var(--line);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }

    .toggle {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      font-weight: 700;
      color: var(--muted);
    }

    .toggle input { width: 18px; height: 18px; }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 800;
      color: white;
      background: linear-gradient(135deg, var(--accent), #1d4ed8);
      box-shadow: 0 12px 24px rgba(59, 130, 246, 0.24);
      cursor: pointer;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .chip {
      padding: 10px 12px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.04);
      border: 1px solid var(--line);
      color: var(--muted);
      min-height: 48px;
    }

    .chip strong { color: var(--text); }

    .message {
      padding: 14px 16px;
      border-radius: 18px;
      margin-bottom: 18px;
      font-weight: 700;
    }

    .info { background: rgba(59, 130, 246, 0.1); color: #1d4ed8; border: 1px solid rgba(59, 130, 246, 0.14); }
    .error { background: rgba(220, 38, 38, 0.08); color: var(--danger); border: 1px solid rgba(220, 38, 38, 0.14); }
    .success { background: rgba(22, 163, 74, 0.08); color: var(--success); border: 1px solid rgba(22, 163, 74, 0.14); }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      padding: 18px;
      border-radius: 22px;
      background: white;
      border: 1px solid var(--line);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .badge {
      width: fit-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.12);
      color: #1d4ed8;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .card h2 { margin: 0; font-size: 1.08rem; }
    .card p { margin: 0; color: var(--muted); line-height: 1.55; }

    @media (max-width: 980px) { .grid, .status-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 640px) {
      .shell { width: min(100% - 16px, 1180px); padding-top: 16px; }
      .hero, .surface { padding: 18px; border-radius: 22px; }
      .grid, .status-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="eyebrow">Q14 - Retry logic</div>
      <h1>Automatic retry for unstable API requests</h1>
      <p class="lead">The request is wrapped in a retry loop with backoff. You can switch between a recoverable failure pattern and a full failure mode to see both the success and error states.</p>

      <div class="surface">
        <div class="controls">
          <label class="toggle"><input type="checkbox" id="failMode"> Force permanent failure</label>
          <button class="btn" id="refreshBtn">Request data</button>
        </div>

        <div class="status-grid">
          <div class="chip"><strong id="attemptChip">Attempt:</strong> idle</div>
          <div class="chip"><strong id="retryChip">Retries left:</strong> 3</div>
          <div class="chip"><strong id="latencyChip">Latency:</strong> 0 ms</div>
          <div class="chip"><strong id="modeChip">Mode:</strong> recoverable</div>
        </div>

        <div id="message"></div>
        <div id="list"></div>
      </div>
    </section>
  </main>

  <script>
    const refreshBtn = document.getElementById('refreshBtn');
    const failMode = document.getElementById('failMode');
    const message = document.getElementById('message');
    const list = document.getElementById('list');
    const attemptChip = document.getElementById('attemptChip');
    const retryChip = document.getElementById('retryChip');
    const latencyChip = document.getElementById('latencyChip');
    const modeChip = document.getElementById('modeChip');

    const cards = [
      ['Search index', 'Last sync completed 5 minutes ago.'],
      ['Orders pipeline', '12 fresh records processed in the last run.'],
      ['Revenue snapshot', 'Growth is trending 8% above the weekly baseline.'],
      ['Support queue', 'Two high priority tickets are still open.'],
      ['Traffic watch', 'API response times are within target range.'],
      ['Delivery health', 'One region is retrying its data fetch.']
    ];

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function unstableApiRequest(attempt, forceFailure) {
      const latency = 500 + attempt * 220;
      await wait(latency);
      if (forceFailure || attempt < 3) {
        throw new Error(attempt === 3 ? 'Server still unavailable.' : 'Temporary network issue.');
      }
      return cards.map(([title, description], index) => ({ id: index + 1, title, description }));
    }

    async function fetchWithRetry() {
      const forceFailure = failMode.checked;
      modeChip.textContent = `Mode: ${forceFailure ? 'permanent failure' : 'recoverable'}`;
      list.innerHTML = '';
      message.innerHTML = '<div class="message info">Request started. The page will retry automatically up to 3 times if the request fails.</div>';
      refreshBtn.disabled = true;

      for (let attempt = 1; attempt <= 3; attempt++) {
        attemptChip.textContent = `Attempt: ${attempt}/3`;
        retryChip.textContent = `Retries left: ${3 - attempt}`;
        const start = performance.now();
        try {
          const data = await unstableApiRequest(attempt, forceFailure);
          const elapsed = Math.round(performance.now() - start);
          latencyChip.textContent = `Latency: ${elapsed} ms`;
          message.innerHTML = `<div class="message success">Data loaded successfully on attempt ${attempt}.</div>`;
          list.innerHTML = `
            <section class="grid">
              ${data.map(item => `
                <article class="card">
                  <div class="badge">Fetched</div>
                  <h2>${item.title}</h2>
                  <p>${item.description}</p>
                </article>
              `).join('')}
            </section>
          `;
          refreshBtn.disabled = false;
          return;
        } catch (error) {
          const elapsed = Math.round(performance.now() - start);
          latencyChip.textContent = `Latency: ${elapsed} ms`;
          if (attempt < 3) {
            message.innerHTML = `<div class="message info">Attempt ${attempt} failed. Retrying automatically...</div>`;
            await wait(350 * attempt);
          } else {
            message.innerHTML = `<div class="message error">All retries failed. ${error.message}</div>`;
            list.innerHTML = '';
          }
        }
      }

      refreshBtn.disabled = false;
    }

    refreshBtn.addEventListener('click', fetchWithRetry);
    failMode.addEventListener('change', fetchWithRetry);
    fetchWithRetry();
  </script>
</body>
</html>
